# Generated by /cenci:configure — per-repo lazyboards board config.
# NOTE: a local `columns:` list REPLACES the global column list entirely, so
# every column and its actions are re-listed here in full (mirrors
# ~/.config/lazyboards/config.yml), plus the repo-local In Review `W` action.
columns:
  - name: New
    actions:
      R:
        {
          name: Refine,
          type: shell,
          command: "cenci run refine {number} --model sonnet -- {comment}",
        }
      G:
        {
          name: Jump to agent,
          type: shell,
          command: 'tmux switch-client -t "={window}"',
        }

  - name: Refined
    actions:
      D:
        {
          name: Design,
          type: shell,
          command: "cenci run design {number} --model sonnet --no-sandbox -- {comment}",
        }
      I:
        {
          name: Implement,
          type: shell,
          command: "cenci run implement {number} --model sonnet -- {comment}",
        }
      G:
        {
          name: Jump to agent,
          type: shell,
          command: 'tmux switch-client -t "={window}"',
        }

  - name: Planned
    actions:
      I:
        {
          name: Implement,
          type: shell,
          command: "cenci run implement {number} --model sonnet -- {comment}",
        }
      G:
        {
          name: Jump to agent,
          type: shell,
          command: 'tmux switch-client -t "={window}"',
        }

  - name: In Review
    actions:
      W:
        {
          name: Run lazyboards worktree,
          type: shell,
          scope: pr,
          command: 'tmux new-window -d -n pr-{pr_number} -c {pr_worktree} "go run ."',
        }
